[mod-name]
Age-of-Production=Wiek produkcji

[mod-description]
Age-of-Production=Dodaje nowe maszyny do gry „Space Age”, aby zwiększyć różnorodność i skalę produkcji!

[mod-setting-name]
aop-merge-hydro=Połącz elektrownie wodne i hydrauliczne.
aop-merge-lignumis-lumber-mill=Połącz tartaki z AoP i Lignumis.
aop-merge-atomic-enricher=Połącz wzbogacacz atomowy i kuźnię atomową z Nuclear Science.
aop-specialized-science=Włącz naukę specjalistyczną.
aop-prevent-loops=Zapobiegaj powstawaniu pętli w łańcuchach produkcyjnych.


[mod-setting-description]
aop-merge-hydro=Usuń elektrownię hydrauliczną i zmodyfikuj ją tak, aby produkowała 25% i zapewniała 25% jakości.
aop-merge-lignumis-lumber-mill=Usuń tartak z AoP i zachowaj tylko tartak z Lignumis.
aop-merge-atomic-enricher=Usuń wzbogacacz atomowy i zachowaj tylko kuźnię atomową z pakietu Nuclear Science.
aop-specialized-science=To ustawienie, jeśli zostanie włączone, włączy technologię Specialized Science, która dodaje nowe receptury do planetarnych pakietów naukowych oraz kilka nowych półproduktów.
aop-prevent-loops=To ustawienie zapobiega powstawaniu pętli nieskończonych podczas syntezy kalcytu i kamienia oraz topnienia lodu i zamarzania wody. Wyłącz, jeśli chcesz, aby pętle występowały. Poinformuj mnie, jeśli znajdziesz więcej pętli, szczególnie bez użycia dodatkowych modów jakości.

