[technology-description]
aop-air-scrubbing=Mała maszyna wykorzystująca katalizator do wychwytywania zanieczyszczeń z powietrza.
aop-additional-air-scrubbing=Dodatkowe badania umożliwiające oczyszczanie powietrza na innych planetach.
aop-arc-furnace=Ogromny piec, który może topić szybciej i wydajniej niż zwykłe piece elektryczne, ale wiąże się to z wyższymi kosztami energii i zanieczyszczeniem.
aop-atomic-enricher=Dzięki wykorzystaniu procesorów kwantowych przetwarzanie uranu może stać się bardziej wydajne.
aop-greenhouse=Bujna oaza spokoju, pozwalająca oderwać się od chaosu panującego w fabryce. Umożliwia uprawę roślin w dowolnym miejscu.
aop-hybridation=Dzięki wykorzystaniu promieniowania i zaawansowanej bioinżynierii można połączyć kąsacze i pięcionogi w coś przerażającego, ale użytecznego.
aop-hydraulics=Dzięki przełomom w hydraulice receptury oparte na płynach są łatwiejsze w wykonaniu i mniej zasobochłonne.
aop-petrochemistry=Badania nad naturą oceanów ropy Fulgory umożliwiają opracowywanie nowych zastosowań w petrochemii.
aop-quantum-machinery=Te superkomputery w pełni wykorzystują możliwości przetwarzania kwantowego, umożliwiając realizację zastosowań, które wcześniej były niemożliwe.
aop-woodworking=Teraz, gdy rozpoczęto sadzenie drzew, można znaleźć dla nich nowe zastosowania.
aop-agriculture-productivity=Zwiększona wydajność upraw w szklarni.
aop-advanced-recycling=Dzięki nowej technologii modułów można wdrożyć nowe techniki recyklingu.
aop-automation=Maszyny montażowe zdolne do przetwarzania płynnych składników, charakteryzujące się większą prędkością, wydajnością i dodatkowymi gniazdami na moduły.
aop-core-mining=Ostatnia granica górnictwa – po co patrzeć w gwiazdy, skoro tak wiele kryje się pod naszymi stopami?
aop-core-mining-productivity=Zwiększona wydajność wiertnic rdzeniowych.
aop-deep-mineral-refining-productivity=Wykorzystaj lepsze techniki przetwarzania głębokich minerałów, aby umożliwić wydobycie większej ilości rud.
aop-armory=Nowe technologie wojskowe pozwalają nam produkować amunicję w niespotykanym dotąd tempie.
aop-specialized-science=Dzięki prowadzeniu szeroko zakrojonych badań na 4 planetach można osiągnąć nowe możliwości w zakresie produkcji przemysłowej i naukowej.
aop-mineral-synthesis=Ponieważ środowisko Aquilo pozbawione jest podstawowych zasobów metalowych, konieczne jest opracowanie nowych technologii umożliwiających ich produkcję.
aop-biomass-reactor=Ponieważ biomasa jest obecnie produkowana na masową skalę, można z niej pozyskiwać energię do zasilania fabryki, a także składniki odżywcze.
aop-smaller-beacons=Kompaktowe i zajmujące mało miejsca nadajniki. Mieszczą tylko jeden moduł, ale charakteryzują się wyższą wydajnością dystrybucji.

