aop-refined-mineral=Przetworzony głęboki minerał, gotowy do wydobycia surowców.
aop-hybrid-bacteria=Słaba hybrydyzacja między bakteriami miedziowymi i żelazowymi. Traci wszystkie właściwości mineralne.
aop-explosive-core=Wysoce wybuchowa głowica bojowa.
aop-magnetic-flow-meter=Przydatne urządzenie w maszynach napędzanych paliwem i petrochemią.

