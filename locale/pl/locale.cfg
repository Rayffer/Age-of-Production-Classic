[recipe-description]
aop-vulcanusian-air-scrubbing=Wychwytywanie zanieczyszczeń z atmosfery Vulcanusa za pomocą kamienia.
aop-nauvitian-air-scrubbing=Wychwytywanie zanieczyszczeń z atmosfery Nauvius za pomocą kalcytu.
aop-gleban-air-scrubbing=Zabijaj zarodniki w atmosferze Gleby za pomocą kwasu siarkowego.
aop-fulgoran-air-scrubbing=Wychwytywanie zanieczyszczeń z atmosfery Fulgory za pomocą kalcytu.
aop-aquiloan-air-scrubbing=Wychwytywanie zanieczyszczeń z atmosfery Aquilo za pomocą zgnilizny.
aop-charcoal=Spalaj drewno, aby uzyskać węgiel.
aop-wood-rotting=Proces rozkładu drewna w celu uzyskania odpadów. Wykorzystuje niewielką ilość odpadów jako katalizatora.
aop-uranium-sifting=Przesiewanie kamieni w celu znalezienia uranu.
aop-solid-fuel-melting=Topienie paliwa stałego w celu uzyskania ropy naftowej.
aop-carbon-liquefaction=Alternatywna technika dla upłynniania węgla.
aop-petroleum-gas-dehydrogenation=Usuń 4 atomy wodoru z gazu ziemnego, pozostawiając tylko węgiel.
aop-nutrients-from-biomass=Przekształcanie biomasy w 75% zepsutą masę składników odżywczych.
aop-direct-molten-copper-from-lava=Przekształcanie lawy w stopioną miedź bez użycia kalcytu.
aop-direct-molten-iron-from-lava=Przekształcanie lawy w stopione żelazo bez użycia kalcytu.
aop-direct-molten-copper=Przekształcanie rudy miedzi w stopioną miedź bez użycia kalcytu.
aop-direct-molten-iron=Przekształcanie rudy żelaza w stopione żelazo bez użycia kalcytu.
aop-lava-demineralization=Usuwanie zanieczyszczeń z lawy.
aop-core-mining=Kop głęboko pod powierzchnią planet, aby uzyskać czyste surowce.
aop-mineral-slurry=Przekształć głębokie minerały w zawiesinę do przetworzenia.
aop-mineral-slurry-processing=Oczyszczanie zawiesiny z zanieczyszczeń w celu uzyskania rafinowanych minerałów.
aop-ammoniacal-iron-synthesis=W ramach tego procesu można wychwycić cząsteczki żelaza obecne w Morzu Amoniakalnym w Aquilo na kawałkach węgla, aby zsyntetyzować rudę żelaza.
aop-ammoniacal-copper-synthesis=Za pomocą tego procesu można wychwycić cząsteczki miedzi obecne w Morzu Amoniakalnym Aquilo na kawałkach węgla, aby zsyntetyzować rudę miedzi.
aop-paracelsian-air-scrubbing=Wychwytuj zanieczyszczenia w atmosferze Paracelsia za pomocą waterytu.

